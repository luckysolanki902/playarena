services:
  - type: web
    name: spyllio-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && NODE_ENV=development pnpm install --frozen-lockfile && pnpm --filter @playarena/shared build && pnpm --filter @playarena/server build
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: AUTO_START_DELAY
        value: 15
      - key: CORS_ORIGINS
        value: https://playarena.vercel.app
